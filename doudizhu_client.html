<!-- doudizhu_client.html - 斗地主联机客户端界面 -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🃏 斗地主联机版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a472a 0%, #2d6a4f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .game-container {
            width: 1200px;
            max-width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        
        /* 顶部状态栏 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin-bottom: 20px;
            color: white;
        }
        
        .room-info {
            display: flex;
            gap: 20px;
        }
        
        .game-phase {
            padding: 5px 15px;
            background: #ffd700;
            color: #1a472a;
            border-radius: 20px;
            font-weight: bold;
        }
        
        /* 牌桌区域 */
        .table {
            position: relative;
            min-height: 500px;
        }
        
        /* 其他玩家区域 */
        .player-area {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .player-left {
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
        }
        
        .player-right {
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
        }
        
        .player-top {
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .player-info {
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 10px;
            margin-bottom: 10px;
            text-align: center;
            min-width: 150px;
        }
        
        .player-name {
            font-weight: bold;
            font-size: 16px;
        }
        
        .player-cards-count {
            color: #666;
            font-size: 14px;
        }
        
        .landlord-badge {
            display: inline-block;
            background: #ffd700;
            color: #1a472a;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 12px;
            margin-left: 5px;
        }
        
        .player-cards {
            display: flex;
            gap: 5px;
        }
        
        .player-cards .card-back {
            width: 40px;
            height: 60px;
            background: linear-gradient(135deg, #1a472a 0%, #2d6a4f 100%);
            border: 2px solid #ffd700;
            border-radius: 5px;
        }
        
        /* 中央出牌区 */
        .play-area {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            min-width: 300px;
            min-height: 120px;
            display: flex;
            flex-direction: column;}
